name: 보안 감사

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # 매주 월요일 오전 9시 (UTC)

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 보안 취약점 검사
        run: npm audit --audit-level=high
